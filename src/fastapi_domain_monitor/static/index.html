<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastAPI Domain Monitor</title>
<style>
  :root {
    --bg: #f8f9fa;
    --text: #1a1a2e;
    --header-bg: #ffffff;
    --sidebar-bg: #f0f1f3;
    --diagram-bg: #ffffff;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-hover: #3a56d4;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --badge-bg: #e9ecef;
  }
  [data-theme="dark"] {
    --bg: #1a1a2e;
    --text: #e8e8f0;
    --header-bg: #16213e;
    --sidebar-bg: #0f3460;
    --diagram-bg: #16213e;
    --border: #2a2a4a;
    --accent: #4cc9f0;
    --accent-hover: #3db8dd;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: #1a1a3e;
    --badge-bg: #2a2a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }
  header {
    height: 56px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 8px var(--shadow);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  header h1 { font-size: 18px; font-weight: 700; white-space: nowrap; }
  header h1 span { color: var(--accent); }
  .search-box {
    position: relative;
    margin-left: auto;
    width: 260px;
  }
  .search-box input {
    width: 100%;
    padding: 7px 32px 7px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box .clear-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    opacity: 0.5;
    display: none;
  }
  .search-box .clear-btn:hover { opacity: 1; }
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    transition: background 0.2s;
  }
  .theme-toggle:hover { background: var(--badge-bg); }
  .layout { display: flex; flex: 1; overflow: hidden; }
  aside {
    width: 220px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .domain-list { display: flex; flex-direction: column; gap: 4px; }
  .domain-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .domain-item input[type="checkbox"] { accent-color: var(--accent); }
  .domain-item:hover { opacity: 0.8; }
  .status-section { margin-top: auto; }
  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.connected { background: #22c55e; }
  .status-dot.disconnected { background: #ef4444; }
  .status-dot.reconnecting { background: #f59e0b; }
  .refresh-btn {
    width: 100%;
    padding: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .refresh-btn:hover { background: var(--accent-hover); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  main {
    flex: 1;
    padding: 16px;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
  }
  #diagram-wrapper {
    flex: 1;
    background: var(--diagram-bg);
    border-radius: 10px;
    box-shadow: 0 2px 12px var(--shadow);
    overflow: hidden;
    cursor: grab;
    position: relative;
    transition: background 0.3s;
  }
  #diagram-wrapper:active { cursor: grabbing; }
  #diagram-container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-origin: 0 0;
  }
  #diagram-container svg { max-width: none !important; max-height: none !important; }
  .error-message {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #ef4444;
    font-size: 14px;
    text-align: center;
    padding: 24px;
  }
  .error-message pre {
    background: var(--badge-bg);
    padding: 12px;
    border-radius: 6px;
    font-size: 12px;
    max-width: 600px;
    overflow: auto;
    white-space: pre-wrap;
    color: var(--text);
    text-align: left;
  }
  .no-domains { font-size: 13px; opacity: 0.6; padding: 4px 0; }
  .highlight-match { fill: #fbbf24 !important; font-weight: bold; }
  [data-theme="dark"] .highlight-match { fill: #f59e0b !important; }
</style>
</head>
<body>
  <header>
    <h1><span>FastAPI</span> Domain Monitor</h1>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search models...">
      <button class="clear-btn" id="search-clear">&times;</button>
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme"></button>
  </header>
  <div class="layout">
    <aside>
      <div>
        <div class="section-title">Domains</div>
        <div class="domain-list" id="domain-list">
          <div class="no-domains">Loading...</div>
        </div>
      </div>
      <div class="status-section">
        <div class="section-title">Status</div>
        <div class="status-indicator">
          <div class="status-dot disconnected" id="status-dot"></div>
          <span id="status-text">Disconnected</span>
        </div>
        <button class="refresh-btn" id="refresh-btn">Refresh</button>
      </div>
    </aside>
    <main>
      <div id="diagram-wrapper">
        <div id="diagram-container">
          <div class="no-domains">Connecting...</div>
        </div>
      </div>
    </main>
  </div>

<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

// --- Helpers ---
function clearChildren(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function showMessage(container, text) {
  clearChildren(container);
  const div = document.createElement('div');
  div.className = 'no-domains';
  div.textContent = text;
  container.appendChild(div);
}

function showError(container, title, detail) {
  clearChildren(container);
  const wrap = document.createElement('div');
  wrap.className = 'error-message';
  const titleEl = document.createElement('div');
  titleEl.textContent = title;
  wrap.appendChild(titleEl);
  if (detail) {
    const pre = document.createElement('pre');
    pre.textContent = detail;
    wrap.appendChild(pre);
  }
  container.appendChild(wrap);
}

// --- State ---
let currentMermaidSource = '';
let domains = [];
let hiddenDomains = new Set();
let domainClassMap = {};  // domain_name → [class_name, ...]
let ws = null;
let retryDelay = 1000;
const MAX_RETRY_DELAY = 30000;
let renderCounter = 0;

// --- Theme ---
const themeToggle = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem('theme') || 'light';
applyTheme(savedTheme);

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  themeToggle.textContent = theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
  localStorage.setItem('theme', theme);
  initMermaid(theme);
}

function initMermaid(theme) {
  mermaid.initialize({
    startOnLoad: false,
    theme: theme === 'dark' ? 'dark' : 'default',
    securityLevel: 'loose'
  });
}

themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  if (currentMermaidSource) renderMermaid(currentMermaidSource);
});

// --- Mermaid Rendering ---
const diagramContainer = document.getElementById('diagram-container');

async function renderMermaid(code) {
  currentMermaidSource = code;
  const filtered = filterMermaidSource(code);
  try {
    renderCounter++;
    const id = 'diagram-' + renderCounter;
    const { svg } = await mermaid.render(id, filtered);
    // mermaid.render produces sanitized SVG — safe to parse and inject via DOM
    const parser = new DOMParser();
    const doc = parser.parseFromString(svg, 'image/svg+xml');
    const svgEl = doc.documentElement;
    if (svgEl.nodeName === 'svg') {
      clearChildren(diagramContainer);
      diagramContainer.appendChild(document.adoptNode(svgEl));
    } else {
      // Fallback: DOMParser returned parsererror, display as text
      showError(diagramContainer, 'SVG parse error', svg);
    }
    resetTransform();
    applySearchHighlight();
  } catch (err) {
    showError(diagramContainer, 'Mermaid rendering error', (err.message || String(err)) + '\n\n' + filtered);
  }
}

function filterMermaidSource(code) {
  if (hiddenDomains.size === 0) return code;

  // Step 1: namespace 블록 제거
  const lines = code.split('\n');
  const result = [];
  let skipDepth = 0;
  let skipping = false;
  for (const line of lines) {
    const nsMatch = line.match(/^\s*namespace\s+(\S+)/);
    if (nsMatch && hiddenDomains.has(nsMatch[1])) {
      skipping = true;
      skipDepth = 1;  // namespace 자체의 { 포함
      continue;
    }
    if (skipping) {
      if (line.includes('{')) skipDepth++;
      if (line.includes('}')) {
        skipDepth--;
        if (skipDepth <= 0) { skipping = false; }
      }
      continue;
    }
    result.push(line);
  }

  // Step 2: 숨겨진 도메인의 클래스가 포함된 관계선 제거
  const hiddenClasses = new Set();
  hiddenDomains.forEach(domain => {
    (domainClassMap[domain] || []).forEach(cls => hiddenClasses.add(cls));
  });

  if (hiddenClasses.size === 0) return result.join('\n');

  return result.filter(line => {
    if (!line.includes('-->') && !line.includes('..>')) return true;
    for (const cls of hiddenClasses) {
      if (new RegExp(`\\b${cls}\\b`).test(line)) return false;
    }
    return true;
  }).join('\n');
}

// --- Pan / Zoom ---
let scale = 1, panX = 0, panY = 0;
let isPanning = false, startX = 0, startY = 0;
const wrapper = document.getElementById('diagram-wrapper');

function applyTransform() {
  diagramContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

function resetTransform() {
  scale = 1; panX = 0; panY = 0;
  diagramContainer.style.transform = 'none';
}

wrapper.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  e.preventDefault();
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyTransform();
});

window.addEventListener('mouseup', () => { isPanning = false; });

wrapper.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = wrapper.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(5.0, Math.max(0.1, scale * delta));
  const ratio = newScale / scale;
  panX = mouseX - ratio * (mouseX - panX);
  panY = mouseY - ratio * (mouseY - panY);
  scale = newScale;
  applyTransform();
}, { passive: false });

wrapper.addEventListener('dblclick', () => { resetTransform(); });

// --- Search ---
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  searchClear.style.display = searchInput.value ? 'block' : 'none';
  applySearchHighlight();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  applySearchHighlight();
});

function applySearchHighlight() {
  const query = searchInput.value.trim().toLowerCase();
  const texts = diagramContainer.querySelectorAll('text, tspan');
  texts.forEach(el => {
    el.classList.remove('highlight-match');
    if (query && el.textContent.toLowerCase().includes(query)) {
      el.classList.add('highlight-match');
    }
  });
}

// --- Domain Filter ---
const domainListEl = document.getElementById('domain-list');

async function loadDomains() {
  try {
    const res = await fetch('api/schema');
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    // DomainSchema: { modules: [{domain_name, classes: [{name,...}], ...}, ...] }
    domains = (data.modules || []).map(m => m.domain_name).filter(Boolean);
    domainClassMap = {};
    (data.modules || []).forEach(m => {
      if (m.domain_name) {
        domainClassMap[m.domain_name] = (m.classes || []).map(c => c.name);
      }
    });
    renderDomainList();
  } catch {
    showMessage(domainListEl, 'Failed to load domains');
  }
}

function renderDomainList() {
  clearChildren(domainListEl);
  if (domains.length === 0) {
    showMessage(domainListEl, 'No domains found');
    return;
  }
  domains.forEach(domain => {
    const label = document.createElement('label');
    label.className = 'domain-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !hiddenDomains.has(domain);
    cb.addEventListener('change', () => {
      if (cb.checked) hiddenDomains.delete(domain);
      else hiddenDomains.add(domain);
      if (currentMermaidSource) renderMermaid(currentMermaidSource);
    });
    const span = document.createElement('span');
    span.textContent = domain;
    label.appendChild(cb);
    label.appendChild(span);
    domainListEl.appendChild(label);
  });
}

// --- WebSocket ---
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

function updateStatus(state) {
  statusDot.className = 'status-dot ' + state;
  const labels = { connected: 'Connected', disconnected: 'Disconnected', reconnecting: 'Reconnecting...' };
  statusText.textContent = labels[state] || state;
}

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/domain-monitor/ws`);

  ws.onopen = () => {
    retryDelay = 1000;
    updateStatus('connected');
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'update' && data.mermaid) {
        renderMermaid(data.mermaid);
      }
    } catch { /* ignore parse errors */ }
  };

  ws.onclose = () => {
    updateStatus('reconnecting');
    setTimeout(() => { connect(); }, retryDelay);
    retryDelay = Math.min(retryDelay * 2, MAX_RETRY_DELAY);
  };

  ws.onerror = () => { ws.close(); };
}

// --- Refresh ---
const refreshBtn = document.getElementById('refresh-btn');

refreshBtn.addEventListener('click', async () => {
  refreshBtn.disabled = true;
  try {
    const res = await fetch('api/mermaid');
    if (!res.ok) throw new Error('Failed to fetch');
    const code = await res.text();
    if (code.trim()) await renderMermaid(code);
  } catch (err) {
    showError(diagramContainer, 'Failed to refresh diagram', err.message);
  } finally {
    refreshBtn.disabled = false;
  }
});

// --- Init ---
async function init() {
  try {
    const res = await fetch('api/mermaid');
    if (res.ok) {
      const code = await res.text();
      if (code.trim()) await renderMermaid(code);
    }
  } catch {
    showError(diagramContainer, 'Failed to load initial diagram');
  }
  await loadDomains();
  connect();
}

init();
</script>
</body>
</html>
